test.application=web

#Browser setting
default.browser=chrome

#Page load timeouts
default.timeout.page_load=10000

####################
#Selenium Grid
####################
grid.run=false

######Environment URL
environment=Cert
#Dev , Cert , Cert2 , Pre , Pre2 , Prod
###set dimension explicitly
dimensionWidth=1600
dimensionHeight=900
project=santander


webservice=https://webapiuk-taassel-pre.appls-ukpre03a.paas.santanderuk.pre.corp/
webdriver.chrome.driver=browserdrivers/chromedriver.exe
webdriver.ie.driver=browserdrivers/IEDriverServer.exe
webdriver.gecko.driver=browserdrivers/geckodriver.exe

browser=chrome
browserversion=76.0.3809.87
token=test-password
applicationtype=internet


chrome.custom.cap=enable-automation;--disable-infobars;--start-maximized;--disable-popup-blocking;--disable-popup-blocking;--disable-notifications
ie.custom.cap = [{"platform":WINDOWS},{"InternetExplorerDriver.INTRODUCE_FLAKINESS_BY_IGNORING_SECURITY_DOMAINS":true},{"InternetExplorerDriver.REQUIRE_WINDOW_FOCUS":true},{"ie.ensureCleanSession": true},{"InternetExplorerDriver.IE_SWITCHES": -private},{"ignoreZoomSetting": true},{"nativeEvents": true},{"ignoreProtectedModeSettings": true},{"disable-popup-blocking": true},{"enablePersistentHover": true},{"InternetExplorerDriver.IE_ENSURE_CLEAN_SESSION": true}]
edge.custom.cap = [{"CapabilityType.ForSeleniumServer.ENSURING_CLEAN_SESSION":true},{"CapabilityType.ACCEPT_SSL_CERTS":true}]
safari.custom.cap = [{"CapabilityType.ACCEPT_SSL_CERTS":true}]
firefox.custom.cap=[{"network.proxy.type":5},{"network.http.phishy-userpass-length":255}]



